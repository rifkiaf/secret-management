name: Test Required Secrets

on:
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          
        run: |
          fail_if_empty () {
            if [ -z "$2" ]; then
              echo "❌ $1 is missing or empty"
              exit 1
            else
              echo "✅ $1 is set"
            fi
          }

          fail_if_empty "APP_SECRET" "$APP_SECRET"
          fail_if_empty "DATABASE_PASSWORD" "$DATABASE_PASSWORD"
          fail_if_empty "JWT_SECRET" "$JWT_SECRET"

          echo "✨ All required secrets are present!"