name: Test Required Secrets

on:
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Verify Secret Integrity
        run: |
          # Ambil 5 karakter pertama dari hash SHA256 secret
          # Kita bandingkan dengan hash yang sudah kita tahu sebelumnya
          EXPECTED_HASH="a1b2c3d4" 
          ACTUAL_HASH=$(echo -n "${{ secrets.DATABASE_PASSWORD }}" | sha256sum | cut -c1-8)
          
          if [ "$ACTUAL_HASH" == "$EXPECTED_HASH" ]; then
            echo "✅ Secret is correct and matching!"
          else
            echo "❌ Secret mismatch or corrupted during sync!"
            exit 1
          fi

      - name: Validate secrets
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          
        run: |
          fail_if_empty () {
            if [ -z "$2" ]; then
              echo "❌ $1 is missing or empty"
              exit 1
            else
              echo "✅ $1 is set"
            fi
          }

          fail_if_empty "APP_SECRET" "$APP_SECRET"
          fail_if_empty "DATABASE_PASSWORD" "$DATABASE_PASSWORD"
          fail_if_empty "JWT_SECRET" "$JWT_SECRET"

          echo "✨ All required secrets are present!"